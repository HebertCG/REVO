services:
  - type: web
    name: revo-auth-service
    env: python
    plan: free
    rootDir: services/auth-service
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: revo-survey-service
    env: python
    plan: free
    rootDir: services/survey-service
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false

  - type: web
    name: revo-ml-service
    env: python
    plan: free
    rootDir: services/ml-service
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python train_cron.py & uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
